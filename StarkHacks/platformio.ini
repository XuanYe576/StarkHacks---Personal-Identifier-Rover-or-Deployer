; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor for CSI stream + servo commands
monitor_speed = 921600

; Upload command can use your board's USB port if needed, e.g.:
; upload_port = /dev/cu.usbmodemXXXX
; monitor_port = /dev/cu.usbmodemXXXX

; Embedded firmware flags used at upload/build time
build_flags =
  ; CSI nodes join Rover AP (TzariumRover) as STA.
  -DCSI_WIFI_AP_MODE=0
  -DWIFI_AP_SSID=\"TzariumCSI\"
  -DWIFI_AP_PASSWORD=\"tzarium1234\"
  -DWIFI_AP_CHANNEL=6
  -DWIFI_SSID=\"TzariumRover\"
  -DWIFI_PASSWORD=\"rover1234\"
  -DDEVICE_HOSTNAME=\"tzarium-csi-130\"
  -DCSI_UDP_ENABLE=1
  -DCSI_UDP_PORT=3333
  ; AP mode default uses broadcast so Mac can receive without fixed target IP.
  -DCSI_UDP_TARGET=\"255.255.255.255\"
  -DCSI_UDP_IQ_STREAM=1

lib_deps =
  madhephaestus/ESP32Servo

[env:csi_node_a]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
build_flags =
  -DCSI_WIFI_AP_MODE=0
  -DWIFI_SSID=\"TzariumRover\"
  -DWIFI_PASSWORD=\"rover1234\"
  -DDEVICE_HOSTNAME=\"tzarium-csi-a\"
  -DCSI_UDP_ENABLE=1
  -DCSI_UDP_IQ_STREAM=1
  -DCSI_NODE_ROLE=1
  -DCSI_RELAY_LISTEN_PORT=3340
  -DCSI_UDP_PORT=3333
  -DCSI_UDP_TARGET=\"255.255.255.255\"
lib_deps =
  madhephaestus/ESP32Servo

[env:csi_node_b]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
build_flags =
  -DCSI_WIFI_AP_MODE=0
  -DWIFI_SSID=\"TzariumRover\"
  -DWIFI_PASSWORD=\"rover1234\"
  -DDEVICE_HOSTNAME=\"tzarium-csi-b\"
  -DCSI_UDP_ENABLE=1
  -DCSI_UDP_IQ_STREAM=1
  -DCSI_NODE_ROLE=2
  -DCSI_RELAY_TARGET=\"192.168.4.2\"
  -DCSI_RELAY_LISTEN_PORT=3340
  -DCSI_UDP_PORT=3333
  -DCSI_UDP_TARGET=\"255.255.255.255\"
lib_deps =
  madhephaestus/ESP32Servo
